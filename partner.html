<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partner · Alation Partner Network</title>
<style>
  :root{
    --orange:#F25C05;--orange-dark:#D44E03;--orange-soft:#FFF1E9;
    --slate:#1E2A38;--slate-2:#33475B;--slate-30:#9AA7B4;
    --line:#E4E9EE;--bg:#FFFFFF;--bg-soft:#F7F9FB;--ink:#1E2A38;--ink-soft:#5A6B7B;
    --shadow:0 10px 30px rgba(30,42,56,.08);--shadow-lg:0 24px 60px rgba(30,42,56,.16);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1080px;margin:0 auto;padding:0 28px}
  .eyebrow{font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--orange)}
  h1,h2,h3{line-height:1.14;letter-spacing:-.02em;color:var(--slate)}
  h2{font-size:28px;margin-bottom:12px}
  .muted{color:var(--ink-soft)}
  .btn{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:15px;padding:12px 22px;border-radius:999px;cursor:pointer;border:none;transition:.18s}
  .btn-primary{background:var(--orange);color:#fff}
  .btn-primary:hover{background:var(--orange-dark);transform:translateY(-1px)}
  .btn-ghost{background:transparent;color:var(--slate);border:1.5px solid var(--line)}
  .btn-ghost:hover{border-color:var(--orange);color:var(--orange)}
  .btn-light{background:rgba(255,255,255,.14);color:#fff;border:1.5px solid rgba(255,255,255,.35)}
  .btn-light:hover{background:rgba(255,255,255,.24)}

  .versionbar{background:var(--slate);color:#fff;font-size:12.5px;font-weight:600;text-align:center;padding:8px 16px;letter-spacing:.01em;position:sticky;top:0;z-index:70}
  .versionbar b{color:#FF9A4D;font-weight:800}
  header.nav{position:sticky;top:0;z-index:60;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px;max-width:1080px;margin:0 auto;padding:0 28px}
  .logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:19px;color:var(--slate)}
  .logo .dot{width:13px;height:13px;border-radius:50%;background:var(--orange)}
  .logo .aios{color:var(--orange)}
  .backlink{font-size:14px;font-weight:700;color:var(--slate-2)}
  .backlink:hover{color:var(--orange)}

  /* partner hero */
  .phero{position:relative;color:#fff;overflow:hidden;padding:58px 0 50px}
  .phero .wrap{position:relative;z-index:2}
  .phero .ptype{font-size:12.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.75)}
  .phead{display:flex;align-items:center;gap:22px;margin:14px 0 18px;flex-wrap:wrap}
  .plogo{width:78px;height:78px;border-radius:18px;display:flex;align-items:center;justify-content:center;flex:none;box-shadow:0 12px 30px rgba(0,0,0,.35)}
  .plogo svg{width:58%;height:58%;display:block}
  .phero h1{color:#fff;font-size:44px}
  .pbadges{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .pbadge{font-size:11.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:5px 12px;border-radius:999px;background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.25)}
  .ptag{font-size:19px;color:rgba(255,255,255,.92);max-width:680px;margin-top:4px}
  .phero-cta{display:flex;gap:12px;flex-wrap:wrap;margin-top:26px}

  /* glance strip */
  .glance{background:var(--bg-soft);border-bottom:1px solid var(--line)}
  .glance .wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;padding:24px 28px}
  @media(max-width:760px){.glance .wrap{grid-template-columns:1fr 1fr}}
  .gitem .k{font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--slate-30)}
  .gitem .v{font-size:15px;font-weight:700;color:var(--slate);margin-top:3px}

  .section{padding:52px 0}
  .section.tight{padding:40px 0}
  .lead{font-size:17px;color:var(--ink-soft);max-width:760px}
  .lead p{margin-bottom:14px}

  .scards{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:24px}
  @media(max-width:820px){.scards{grid-template-columns:1fr}}
  .scard{border:1px solid var(--line);border-radius:16px;padding:22px;background:#fff;box-shadow:var(--shadow)}
  .scard .sic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;margin-bottom:12px;font-size:18px}
  .scard h3{font-size:17px;margin-bottom:6px}
  .scard p{font-size:14px;color:var(--ink-soft)}

  .quote{background:var(--slate);color:#fff;border-radius:20px;padding:38px 40px;margin-top:8px}
  .quote .mark{font-family:Georgia,serif;font-size:64px;line-height:.2;color:var(--orange);display:block;height:26px}
  .quote blockquote{font-size:23px;font-weight:600;line-height:1.4;letter-spacing:-.01em;color:#fff}
  .quote .src{font-size:13px;color:var(--slate-30);margin-top:14px;font-weight:600}

  .proof{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:22px}
  @media(max-width:760px){.proof{grid-template-columns:1fr}}
  .pitem{border-left:3px solid var(--orange);padding:6px 0 6px 16px}
  .pitem h4{font-size:15.5px;color:var(--slate)}
  .pitem p{font-size:13.5px;color:var(--ink-soft);margin-top:3px}

  .related{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:22px}
  @media(max-width:760px){.related{grid-template-columns:1fr 1fr}}
  .rcard{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:14px;padding:14px 16px;background:#fff;transition:.16s}
  .rcard:hover{box-shadow:var(--shadow);transform:translateY(-2px);border-color:transparent}
  .rlogo{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex:none}
  .rlogo svg{width:60%;height:60%}
  .rcard .rn{font-weight:800;font-size:15px;color:var(--slate)}
  .rcard .rm{font-size:12px;color:var(--slate-30);font-weight:600}

  /* closing cta band */
  .ctaband{background:linear-gradient(135deg,#FFF7F2,#FFFFFF);border-top:1px solid var(--line)}
  .ctaband .wrap{padding:56px 28px;text-align:center}
  .ctaband h2{font-size:30px}
  .ctaband p{color:var(--ink-soft);max-width:600px;margin:10px auto 22px}
  .ctaband .row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

  footer.ft{background:var(--slate);color:#C7D0DA;padding:40px 0;margin-top:0}
  footer.ft .wrap{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;align-items:center}
  footer.ft .fnote{font-size:12.5px;color:var(--slate-30);max-width:520px}
  footer.ft a{color:#fff;font-weight:600}

  .fallback{padding:80px 0;text-align:center}
  .fallback h1{font-size:34px;margin:16px 0 10px}
</style>
</head>
<body>
<div class="versionbar"><b>PROTOTYPE</b> · v0.20 · Jul 6 2026 — concept for discussion only, not an official Alation page</div>
<header class="nav">
  <div class="nav-inner">
    <a class="logo" href="index.html"><span class="dot"></span>Alation <span class="aios">AIOS™</span></a>
    <a class="backlink" href="index.html#directory">← Back to the network</a>
  </div>
</header>

<main id="page"></main>

<footer class="ft">
  <div class="wrap">
    <div class="fnote"><strong style="color:#fff">Alation AIOS™ Partner Network</strong><br>Concept redesign / prototype. Not an official Alation page.</div>
    <div><a href="index.html">Home</a> &nbsp;·&nbsp; <a href="index.html#directory">Directory</a> &nbsp;·&nbsp; <a href="index.html#join">Become a partner</a></div>
  </div>
</footer>

<script>
// ---- brand marks (shared with the homepage) ----
const LOGOS={
  "PwC":'<svg viewBox="0 0 24 24"><text x="12" y="15.5" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="11" fill="#fff" letter-spacing="-.5">pwc</text></svg>',
  "Accenture":'<svg viewBox="0 0 24 24"><path d="M7 5L16 12L7 19" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  "Capgemini":'<svg viewBox="0 0 24 24"><path d="M5 18C9 7 15 6 19 7.5C13 8.5 10 12.5 9 18Z" fill="#fff"/></svg>',
  "Snowflake":'<svg viewBox="0 0 24 24" stroke="#fff" stroke-width="1.7" stroke-linecap="round"><line x1="12" y1="3.5" x2="12" y2="20.5"/><line x1="4.6" y1="7.75" x2="19.4" y2="16.25"/><line x1="4.6" y1="16.25" x2="19.4" y2="7.75"/></svg>',
  "Databricks":'<svg viewBox="0 0 24 24" fill="#fff"><path d="M5 8l7-3.2 7 3.2-7 3.2z"/><path d="M5 12.8l7-3.2 7 3.2-7 3.2z" opacity=".7"/><path d="M5 17.6l7-3.2 7 3.2-7 3.2z" opacity=".5"/></svg>',
  "AWS":'<svg viewBox="0 0 24 24"><text x="12" y="12" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="8.5" fill="#fff">aws</text><path d="M6 16c4 2.6 8 2.6 12 0" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/><path d="M16.2 15.1l2.1.6-.7 2" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  "Salesforce":'<svg viewBox="0 0 24 24" fill="#fff"><path d="M16.8 17.5H8.4a3.7 3.7 0 0 1-1-7.2 4.3 4.3 0 0 1 8-1.2 3.1 3.1 0 0 1 1.4 8.4z"/></svg>',
  "Azure":'<svg viewBox="0 0 24 24" fill="#fff"><path d="M10.6 4.5L4.5 19.5h4.2l1.1-3 5.6 1.6z"/><path d="M12.2 7.5l6.3 12H10.6l3.1-6.6z" opacity=".7"/></svg>',
  "OpenAI":'<svg viewBox="0 0 24 24" fill="#fff"><g transform="translate(12,12)"><ellipse rx="2.1" ry="6.4"/><ellipse rx="2.1" ry="6.4" transform="rotate(60)"/><ellipse rx="2.1" ry="6.4" transform="rotate(120)"/></g></svg>'
};
LOGOS["Microsoft Azure"]=LOGOS["Azure"];

// brief info for every node (used for related cards + fallback)
const BRIEF={
  openai:{name:"OpenAI",color:"#10A37F"},
  pwc:{name:"PwC",color:"#D04A02"},
  accenture:{name:"Accenture",color:"#A100FF"},
  capgemini:{name:"Capgemini",color:"#0070AD"},
  snowflake:{name:"Snowflake",color:"#29B5E8"},
  databricks:{name:"Databricks",color:"#FF3621"},
  aws:{name:"AWS",color:"#FF9900"},
  salesforce:{name:"Salesforce",color:"#00A1E0"},
  azure:{name:"Microsoft Azure",color:"#0078D4"}
};

// ---- full detail data (OpenAI populated as the exemplar) ----
const PARTNERS={
  openai:{
    name:"OpenAI", color:"#10A37F", type:"Technology partner",
    badges:["Launch plugin partner","AI-Ready"],
    tagline:"The AI model provider behind Codex — with Alation as the trusted knowledge layer for enterprise AI agents.",
    glance:[
      {k:"Partner type", v:"Technology · AI model provider"},
      {k:"Relationship", v:"Codex launch plugin partner"},
      {k:"Integration", v:"Alation Codex plugin"},
      {k:"Focus", v:"Governed context for AI agents"}
    ],
    history:"OpenAI is an AI research and deployment company founded in 2015 with the mission of ensuring that artificial general intelligence benefits all of humanity. It is best known for the GPT family of large language models and for ChatGPT, which brought generative AI into mainstream use. Today its platform spans frontier models delivered through an API, enterprise offerings, and Codex — OpenAI's environment for turning natural-language intent into working code, analysis, and agentic workflows used by millions of people every week.",
    alation:"Alation is a launch partner for OpenAI Codex plugins. The plugin brings an organization's trusted data, governed metadata, and clear business context directly into Codex — so the agents and workflows people build are grounded in knowledge they can trust rather than guesswork. It reflects a core idea of the partnership: AI-ready data and context preparation aren't a one-time exercise but a continuous feedback loop, and Alation is the knowledge layer that keeps that context governed, explainable, and current for every model and agent in the stack.",
    solutions:[
      {t:"Alation Codex plugin", d:"Surface governed metadata, lineage, and business-glossary context inside OpenAI Codex, so agents answer from trusted, documented data."},
      {t:"Knowledge layer for agents", d:"Feed OpenAI-powered agents curated, policy-aware context from the Alation catalog — reducing hallucination and improving trust."},
      {t:"Continuous AI-readiness", d:"Keep data and context model-ready with ongoing curation and a feedback loop between real usage and governance."}
    ],
    whyItMatters:"AI agents are only as good as the context they can access. With Alation in Codex, AI and data teams bring their organization's knowledge — trusted data, governed metadata, and clear context — directly into the model.",
    quoteSrc:"Positioning from the Codex launch announcement (illustrative)",
    proof:[
      {t:"Grounded answers", d:"Agents reason over governed, documented data instead of guesswork."},
      {t:"Trust by default", d:"Policy, lineage, and ownership travel with the context into Codex."},
      {t:"Reuse what you have", d:"Existing Alation metadata becomes usable inside OpenAI workflows."}
    ],
    ctas:[
      {label:"Become a partner", href:"index.html#join", primary:true},
      {label:"Explore the directory", href:"index.html#directory"},
      {label:"Read the announcement ↗", href:"https://www.linkedin.com/feed/update/urn:li:activity:7467742034540421121/", ext:true}
    ],
    related:["snowflake","databricks","aws","salesforce"]
  }
};

// ---- render ----
function qs(k){return new URLSearchParams(location.search).get(k);}
function tile(cls,color,name,size){return '<div class="'+cls+'" style="background:'+color+'">'+(LOGOS[name]||'')+'</div>';}

function render(){
  const slug=(qs('p')||'').toLowerCase();
  const p=PARTNERS[slug];
  const el=document.getElementById('page');
  if(!p){ renderFallback(slug, el); return; }

  document.title=p.name+" · Alation Partner Network";
  const heroBg="radial-gradient(900px 420px at 12% -25%,"+p.color+"55, transparent 60%),linear-gradient(135deg,#1E2A38,#0e1726)";
  const badges=(p.badges||[]).map(b=>'<span class="pbadge">'+b+'</span>').join('');
  const ctas=(p.ctas||[]).map((c,i)=>'<a class="btn '+(c.primary?'btn-primary':'btn-light')+'" href="'+c.href+'"'+(c.ext?' target="_blank" rel="noopener"':'')+'>'+c.label+'</a>').join('');
  const glance=(p.glance||[]).map(g=>'<div class="gitem"><div class="k">'+g.k+'</div><div class="v">'+g.v+'</div></div>').join('');
  const sols=(p.solutions||[]).map(s=>'<div class="scard"><div class="sic" style="background:'+p.color+'">'+(LOGOS[p.name]||'★')+'</div><h3>'+s.t+'</h3><p>'+s.d+'</p></div>').join('');
  const proof=(p.proof||[]).map(x=>'<div class="pitem"><h4>'+x.t+'</h4><p>'+x.d+'</p></div>').join('');
  const related=(p.related||[]).map(rs=>{const b=BRIEF[rs];if(!b)return '';return '<a class="rcard" href="partner.html?p='+rs+'"><div class="rlogo" style="background:'+b.color+'">'+(LOGOS[b.name]||'')+'</div><div><div class="rn">'+b.name+'</div><div class="rm">View partner →</div></div></a>';}).join('');

  el.innerHTML=`
  <section class="phero" style="background:${heroBg}">
    <div class="wrap">
      <div class="ptype">${p.type}</div>
      <div class="phead">
        <div class="plogo" style="background:${p.color}">${LOGOS[p.name]||''}</div>
        <div><h1>${p.name}</h1><div class="pbadges">${badges}</div></div>
      </div>
      <p class="ptag">${p.tagline}</p>
      <div class="phero-cta">${ctas}</div>
    </div>
  </section>

  <div class="glance"><div class="wrap">${glance}</div></div>

  <section class="section">
    <div class="wrap">
      <span class="eyebrow">Who they are</span>
      <h2>Background</h2>
      <div class="lead"><p>${p.history}</p></div>
    </div>
  </section>

  <section class="section tight" style="background:var(--bg-soft);border-top:1px solid var(--line);border-bottom:1px solid var(--line)">
    <div class="wrap">
      <span class="eyebrow">The partnership</span>
      <h2>How they work with Alation</h2>
      <div class="lead"><p>${p.alation}</p></div>
    </div>
  </section>

  <section class="section">
    <div class="wrap">
      <span class="eyebrow">Better together</span>
      <h2>Joint solutions &amp; accelerators</h2>
      <div class="scards">${sols}</div>
    </div>
  </section>

  <section class="section tight">
    <div class="wrap">
      <div class="quote">
        <span class="mark">&ldquo;</span>
        <blockquote>${p.whyItMatters}</blockquote>
        <div class="src">${p.quoteSrc||''}</div>
      </div>
      <div class="proof">${proof}</div>
    </div>
  </section>

  ${related?`<section class="section tight" style="background:var(--bg-soft);border-top:1px solid var(--line)">
    <div class="wrap">
      <span class="eyebrow">Keep exploring</span>
      <h2>Related partners</h2>
      <div class="related">${related}</div>
    </div>
  </section>`:''}

  <section class="ctaband">
    <div class="wrap">
      <h2>Build on the AIOS™ together</h2>
      <p>Bring trusted, governed data to every AI agent and workflow. Join the network, or talk to our alliance team about a joint go-to-market.</p>
      <div class="row">
        <a class="btn btn-primary" href="index.html#join">Become a partner</a>
        <a class="btn btn-ghost" href="index.html#directory">Explore the directory</a>
        <a class="btn btn-ghost" href="index.html#join">Contact the alliance team</a>
      </div>
    </div>
  </section>`;
  setNavTop();
}

function renderFallback(slug, el){
  const b=BRIEF[slug];
  const name=b?b.name:'This partner';
  const color=b?b.color:'#33475B';
  document.title=name+" · Alation Partner Network";
  el.innerHTML=`
  <div class="fallback"><div class="wrap">
    <div class="plogo" style="background:${color};margin:0 auto">${(b&&LOGOS[b.name])||''}</div>
    <h1>${name} — full profile coming soon</h1>
    <p class="muted" style="max-width:560px;margin:0 auto 22px">We're building out a dedicated page for ${name} in the Alation AIOS™ ecosystem. In the meantime, explore the partner directory or become a partner.</p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <a class="btn btn-primary" href="index.html#directory">Explore the directory</a>
      <a class="btn btn-ghost" href="index.html">Back to home</a>
    </div>
  </div></div>`;
  setNavTop();
}

function setNavTop(){const vb=document.querySelector('.versionbar');const nav=document.querySelector('header.nav');if(vb&&nav)nav.style.top=vb.offsetHeight+'px';}
window.addEventListener('resize',setNavTop);
render();
</script>
</body>
</html>
